<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet">
</head>
<body>
{% if current_user %}
<nav class="navbar navbar-expand-lg navbar-dark bg-atg sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="/">{{ app_name }}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Mở menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/documents"><i class="bi bi-folder2-open"></i> Văn bản</a></li>
        <li class="nav-item"><a class="nav-link" href="/documents/new"><i class="bi bi-file-earmark-plus"></i> Tạo văn bản</a></li>
        {% if current_user.role in ["root", "admin"] %}
        <li class="nav-item"><a class="nav-link" href="/users"><i class="bi bi-people"></i> Tài khoản</a></li>
        <li class="nav-item"><a class="nav-link" href="/reports"><i class="bi bi-file-earmark-excel"></i> Báo cáo</a></li>
        {% endif %}
      </ul>
      <div class="d-flex align-items-center gap-2 text-white small">
        <span class="d-none d-md-inline">{{ current_user.full_name }}</span>
        <span class="badge text-bg-light">{{ current_user.role|role_label }}</span>
        <form method="post" action="/logout" class="m-0">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="btn btn-sm btn-outline-light" type="submit" title="Đăng xuất"><i class="bi bi-box-arrow-right"></i></button>
        </form>
      </div>
    </div>
  </div>
</nav>
{% endif %}

<main class="container-fluid py-3 py-lg-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>
